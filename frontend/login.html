<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AniNews | Login & Registration</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        .login-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 2rem;
        }

        .auth-card {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            padding: 3rem;
            border-radius: 24px;
            width: 100%;
            max-width: 400px;
            backdrop-filter: blur(20px);
            animation: fadeIn 0.8s ease forwards;
        }

        .auth-card h2 {
            margin-bottom: 2rem;
            text-align: center;
            font-size: 2rem;
            background: linear-gradient(to right, var(--primary), var(--accent));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .auth-card .form-group {
            margin-bottom: 1.5rem;
        }

        .auth-card input {
            width: 100%;
            padding: 1rem;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            color: white;
            font-size: 1rem;
        }

        .auth-card .btn-primary {
            width: 100%;
            padding: 1rem;
            border-radius: 12px;
            margin-top: 1rem;
        }

        .auth-toggle {
            text-align: center;
            margin-top: 1.5rem;
            font-size: 0.9rem;
            color: var(--text-dim);
        }

        .auth-toggle span {
            color: var(--primary);
            cursor: pointer;
            font-weight: 600;
        }

        .error-message {
            color: #ff4d4d;
            font-size: 0.85rem;
            text-align: center;
            margin-top: 1rem;
            display: none;
        }
    </style>
</head>

<body>
    <div class="login-container">
        <div class="auth-card" id="loginCard">
            <h2>Welcome Back</h2>
            <form id="loginForm">
                <div class="form-group">
                    <input type="email" id="loginEmail" placeholder="Email Address" required>
                </div>
                <div class="form-group">
                    <input type="password" id="loginPassword" placeholder="Password" required>
                </div>
                <button type="submit" class="btn-primary">Login</button>
                <div id="loginError" class="error-message"></div>
                <div class="auth-toggle">
                    Don't have an account? <span onclick="toggleAuth('register')">Sign Up</span>
                </div>
            </form>
        </div>

        <div class="auth-card" id="registerCard" style="display: none;">
            <h2>Join AniNews</h2>
            <form id="registerForm">
                <div class="form-group">
                    <input type="email" id="regEmail" placeholder="Email Address" required>
                </div>
                <div class="form-group">
                    <input type="password" id="regPassword" placeholder="Create Password" required>
                </div>
                <button type="submit" class="btn-primary">Create Account</button>
                <div id="regError" class="error-message"></div>
                <div class="auth-toggle">
                    Already have an account? <span onclick="toggleAuth('login')">Login</span>
                </div>
            </form>
        </div>
    </div>

    <script>
        // Redirect if already logged in
        fetch('/api/auth/me').then(res => res.json()).then(data => {
            if (data.status === 'success') window.location.replace('/');
        });

        function toggleAuth(mode) {
            const loginCard = document.getElementById('loginCard');
            const registerCard = document.getElementById('registerCard');
            if (mode === 'register') {
                loginCard.style.display = 'none';
                registerCard.style.display = 'block';
            } else {
                loginCard.style.display = 'block';
                registerCard.style.display = 'none';
            }
        }

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            const errorDiv = document.getElementById('loginError');

            try {
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                const data = await response.json();
                if (data.status === 'success') {
                    localStorage.setItem('first_login', 'true');
                    window.location.replace('/');
                } else {
                    errorDiv.textContent = data.message;
                    errorDiv.style.display = 'block';
                }
            } catch (err) {
                errorDiv.textContent = "Connection error. Try again.";
                errorDiv.style.display = 'block';
            }
        });

        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('regEmail').value;
            const password = document.getElementById('regPassword').value;
            const errorDiv = document.getElementById('regError');

            try {
                const response = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                const data = await response.json();
                if (data.status === 'success') {
                    alert('Registration successful! Please login.');
                    toggleAuth('login');
                } else {
                    errorDiv.textContent = data.message;
                    errorDiv.style.display = 'block';
                }
            } catch (err) {
                errorDiv.textContent = "Connection error. Try again.";
                errorDiv.style.display = 'block';
            }
        });
    </script>
</body>

</html>
