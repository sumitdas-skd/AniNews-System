<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AniNews | Anime Details</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>

<body>
    <div class="main-layout">
        <aside class="sidebar">
            <div class="logo">Ani<span>News</span></div>
            <nav>
                <a href="/">Home</a>
                <a href="/?mode=trending">Trending</a>
                <a href="/admin" id="adminLink" style="display: none;">Admin</a>
            </nav>
            <div id="userProfile" class="user-profile">
                <a href="/login">Login</a>
            </div>
        </aside>

        <main>
            <div id="detailContainer" class="detail-layout">
                <div class="loading">Loading details...</div>
            </div>

            <div class="containerRelated">
                <!-- Related anime will be injected here -->
            </div>
        </main>
    </div>

    <!-- Reminder Modal — SVG icons, no emoji encoding issues -->
    <div id="reminderModal" class="modal">
        <div class="reminder-modal-box">
            <!-- Close: pure SVG X, no unicode chars -->
            <button class="reminder-close-btn" onclick="closeReminderModal()" aria-label="Close">
                <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
                    <line x1="1" y1="1" x2="11" y2="11" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
                    <line x1="11" y1="1" x2="1" y2="11" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
                </svg>
            </button>
            <h3 class="reminder-modal-title">Set Reminder</h3>
            <p class="reminder-sub">Next episode: <strong id="nextEpTime">TBA</strong></p>
            <div class="reminder-modal-body">
                <button class="reminder-btn calendar-btn" onclick="reminderOptionA()">
                    <div class="rbtn-icon-wrap rbtn-icon-cal">
                        <svg width="18" height="18" fill="none" stroke="#ffd700" stroke-width="1.8" viewBox="0 0 24 24">
                            <rect x="3" y="4" width="18" height="18" rx="2"/>
                            <line x1="16" y1="2" x2="16" y2="6"/>
                            <line x1="8" y1="2" x2="8" y2="6"/>
                            <line x1="3" y1="10" x2="21" y2="10"/>
                        </svg>
                    </div>
                    <div class="rbtn-content">
                        <div class="rbtn-label">Add to Calendar</div>
                        <div class="rbtn-sub">Opens in your calendar app</div>
                    </div>
                </button>
                <button class="reminder-btn email-btn" onclick="reminderOptionB()">
                    <div class="rbtn-icon-wrap rbtn-icon-email">
                        <svg width="18" height="18" fill="none" stroke="#a78bfa" stroke-width="1.8" viewBox="0 0 24 24">
                            <rect x="2" y="4" width="20" height="16" rx="2"/>
                            <polyline points="2,4 12,13 22,4"/>
                        </svg>
                    </div>
                    <div class="rbtn-content">
                        <div class="rbtn-label">Email Notification</div>
                        <div class="rbtn-sub" id="reminderEmailSub">Sends alert to your registered email</div>
                    </div>
                </button>
            </div>
        </div>
    </div>

    <script src="detail.js"></script>
</body>

</html>
